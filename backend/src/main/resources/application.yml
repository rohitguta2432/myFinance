spring:
  application:
    name: myfinance-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/myfinance
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  jackson:
    default-property-inclusion: non_null

server:
  port: 8081

# ─── OpenAPI / Swagger UI ────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

logging:
  level:
    com.myfinance: DEBUG
    org.springframework.web: INFO

# ─── Google OAuth (SSO) ────────────────────────────────
google:
  oauth:
    client-id: ${GOOGLE_CLIENT_ID:636804588566-ehgnmkdrbin3vpqd88gsah16vpn0uihi.apps.googleusercontent.com}

# ─── JWT Auth ─────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:myfinance-dev-secret-key-change-in-production-min-256-bits-long!!}
  expiration-ms: ${JWT_EXPIRATION_MS:604800000}  # 7 days

# ─── AWS Bedrock (AI Chat) ────────────────────────────
aws:
  bedrock:
    region: us-east-1
    model-id: amazon.nova-lite-v1:0
