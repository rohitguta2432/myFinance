spring:
  application:
    name: myfinance-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/myfinance
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  jackson:
    default-property-inclusion: non_null

server:
  port: 8081

logging:
  level:
    com.myfinance: DEBUG
    org.springframework.web: INFO

# ─── Google OAuth (SSO) ────────────────────────────────
google:
  oauth:
    client-id: ${GOOGLE_CLIENT_ID:636804588566-ehgnmkdrbin3vpqd88gsah16vpn0uihi.apps.googleusercontent.com}

# ─── AWS Bedrock (AI Chat) ────────────────────────────
aws:
  bedrock:
    region: us-east-1
    model-id: amazon.nova-lite-v1:0
