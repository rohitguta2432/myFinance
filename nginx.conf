# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name api-preprod.myfinancial.in;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api-preprod.myfinancial.in;

    ssl_certificate /etc/letsencrypt/live/api-preprod.myfinancial.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-preprod.myfinancial.in/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Proxy ALL requests to the backend API (frontend served by Amplify separately)
    location / {
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
